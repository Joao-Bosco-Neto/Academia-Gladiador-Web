<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Academia Gladiador</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="layout">
        <div class="container">
            <h1 class="titulo-linha1">Novo Cadastro</h1>
            <h2 class="titulo-linha2">ACADEMIA GLADIADOR</h2>

            <div id="mensagemErro" class="label-erro"></div>
            <div id="mensagemSucesso" class="label-sucesso"></div>

            <form id="formCadastro">
                <input
                    type="text"
                    id="nome"
                    class="campo"
                    placeholder="Nome completo"
                    required
                >

                <select id="sexo" class="campo" required>
                    <option value="">Selecione o sexo</option>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                </select>

                <div class="campo-grupo">
                    <input
                        type="number"
                        id="idade"
                        class="campo"
                        placeholder="Idade"
                        min="1"
                        max="150"
                        required
                    >

                    <input
                        type="number"
                        id="peso"
                        class="campo"
                        placeholder="Peso (kg)"
                        step="0.01"
                        min="1"
                        required
                    >
                </div>

                <input
                    type="number"
                    id="altura"
                    class="campo"
                    placeholder="Altura (m) - Ex: 1.75"
                    step="0.01"
                    min="0.5"
                    max="3"
                    required
                >

                <input
                    type="email"
                    id="email"
                    class="campo"
                    placeholder="E-mail"
                    required
                >

                <input
                    type="text"
                    id="cpf"
                    class="campo"
                    placeholder="CPF (apenas números, 11 dígitos)"
                    maxlength="11"
                    pattern="\d{11}"
                    required
                    title="Digite exatamente 11 dígitos numéricos, sem pontos ou traço"
                >

                <input
                    type="password"
                    id="senha"
                    class="campo"
                    placeholder="Senha (mínimo 6 caracteres)"
                    minlength="6"
                    required
                >

                <select id="plano" class="campo" required>
                    <option value="">Selecione o plano</option>
                    <option value="Anual">Anual</option>
                    <option value="Mensal">Mensal</option>
                    <option value="Diária">Diária</option>
                </select>

                <button type="submit" class="botao botao-cadastrar">Cadastrar</button>
            </form>

            <button
                type="button"
                class="botao botao-voltar"
                onclick="window.location.href='/index.html'"
            >
                Voltar
            </button>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cadastro.js"></script>
</body>
</html>
