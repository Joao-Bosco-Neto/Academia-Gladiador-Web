<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Academia Gladiador</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="layout">
        <div class="container">
            <h1 class="titulo-linha1">Sistema de Gestão</h1>
            <h2 class="titulo-linha2">ACADEMIA GLADIADOR</h2>

            <div id="mensagemErro" class="label-erro"></div>

            <form id="formLogin">
                <input
                    type="email"
                    id="email"
                    class="campo"
                    placeholder="E-mail"
                    required
                    autocomplete="email"
                >

                <input
                    type="password"
                    id="senha"
                    class="campo"
                    placeholder="Senha"
                    required
                    autocomplete="current-password"
                >

                <button type="submit" class="botao botao-entrar">Entrar</button>
            </form>

            <button
                type="button"
                class="botao botao-criar"
                onclick="window.location.href='/cadastro.html'"
            >
                Criar conta
            </button>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Limpar localStorage ao carregar a página de login
        if (window.location.pathname === '/index.html' || window.location.pathname === '/') {
            localStorage.clear();
        }

        // Handler do formulário de login
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            try {
                const resultado = await login(email, senha);

                // Redireciona baseado no tipo de usuário
                if (resultado.tipoUsuario === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/aluno.html';
                }
            } catch (erro) {
                mostrarErro('mensagemErro', erro.message);
            }
        });
    </script>
</body>
</html>
