<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Academia Gladiador</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="layout">
        <div class="container container-large" style="max-width: 1400px;">
            <!-- Header -->
            <div class="header-admin">
                <div>
                    <h1 class="titulo-linha1">Painel Administrativo</h1>
                    <h2 class="titulo-secao">ACADEMIA GLADIADOR</h2>
                </div>
                <input
                    type="text"
                    id="campoBusca"
                    class="campo-busca"
                    placeholder="Buscar por nome ou CPF..."
                    style="max-width: 400px;"
                >
            </div>

            <div id="mensagemErro" class="label-erro"></div>
            <div id="mensagemSucesso" class="label-sucesso"></div>

            <!-- Formulário de Cadastro/Edição -->
            <div class="formulario-admin">
                <h3 style="color: #1565c0; margin-bottom: 20px;">Cadastro / Edição de Aluno</h3>

                <form id="formAluno">
                    <input type="hidden" id="alunoId">

                    <input
                        type="text"
                        id="nome"
                        class="campo"
                        placeholder="Nome completo"
                        required
                    >

                    <div class="campo-grupo">
                        <select id="sexo" class="campo" required>
                            <option value="">Selecione o sexo</option>
                            <option value="M">Masculino</option>
                            <option value="F">Feminino</option>
                        </select>

                        <input
                            type="number"
                            id="idade"
                            class="campo"
                            placeholder="Idade"
                            min="1"
                            max="150"
                            required
                        >
                    </div>

                    <div class="campo-grupo">
                        <input
                            type="number"
                            id="peso"
                            class="campo"
                            placeholder="Peso (kg)"
                            step="0.01"
                            min="1"
                            required
                        >

                        <input
                            type="number"
                            id="altura"
                            class="campo"
                            placeholder="Altura (m)"
                            step="0.01"
                            min="0.5"
                            max="3"
                            required
                        >
                    </div>

                    <input
                        type="email"
                        id="email"
                        class="campo"
                        placeholder="E-mail"
                        required
                    >

                    <input
                        type="text"
                        id="cpf"
                        class="campo"
                        placeholder="CPF (apenas números, 11 dígitos)"
                        maxlength="11"
                        pattern="\d{11}"
                        required
                    >

                    <input
                        type="password"
                        id="senha"
                        class="campo"
                        placeholder="Senha (deixe vazio para manter a atual)"
                        minlength="6"
                    >

                    <select id="plano" class="campo" required>
                        <option value="">Selecione o plano</option>
                        <option value="Anual">Anual</option>
                        <option value="Mensal">Mensal</option>
                        <option value="Diária">Diária</option>
                    </select>
                </form>
            </div>

            <!-- Controles -->
            <div class="controles-admin">
                <button type="button" class="botao-adicionar" onclick="adicionarAluno()">
                    ➕ Adicionar Novo
                </button>
                <button type="button" class="botao-atualizar" onclick="atualizarAluno()" id="btnAtualizar" disabled>
                    ✏️ Atualizar Selecionado
                </button>
                <button type="button" class="botao-excluir" onclick="excluirAluno()" id="btnExcluir" disabled>
                    🗑️ Excluir Selecionado
                </button>
                <button type="button" class="botao-status" onclick="alterarStatus()" id="btnStatus" disabled>
                    🔄 Ativar/Inativar
                </button>
                <button type="button" class="botao-sair" onclick="logout()">
                    🚪 Sair
                </button>
            </div>

            <!-- Tabela de Alunos -->
            <div class="tabela-container">
                <table class="tabela">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Plano</th>
                            <th>IMC</th>
                            <th>Status</th>
                            <th>Tipo</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAlunos">
                        <!-- Linhas serão inseridas dinamicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
